<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Cash Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981; /* Emerald Green */
            --dark: #064e3b;
            --light-bg: #f0fdf4;
            --white: #ffffff;
            --danger: #ef4444;
            --text: #1f2937;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--light-bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: auto; }

        /* Header Section */
        header {
            background: var(--primary);
            color: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2);
        }

        header h1 { margin: 0; font-size: 28px; }

        /* Dashboard Stats */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            border-bottom: 5px solid transparent;
        }

        .stat-card.in { border-color: var(--primary); }
        .stat-card.out { border-color: var(--danger); }
        .stat-card.bal { border-color: #3b82f6; }

        .stat-card h3 { margin: 0; font-size: 14px; color: #6b7280; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 32px; font-weight: 700; }

        /* Input Form */
        .form-card {
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--dark); font-size: 14px; }
