<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History</title>
</head>
<body>
    <h1>Transaction History</h1>
    <div>
        <h2>Balance: <span id="balance">0</span></h2>
        <button id="cashIn">Cash In</button>
        <button id="cashOut">Cash Out</button>
    </div>

    <div>
        <h3>Add Transaction</h3>
        <form id="transactionForm">
            <input type="text" id="transactionName" placeholder="Transaction Name" required />
            <input type="number" id="transactionAmount" placeholder="Amount" required />
            <button type="submit">Add Transaction</button>
        </form>
    </div>

    <div>
        <h3>Transaction History</h3>
        <select id="filter">
            <option value="all">All</option>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>
        <ul id="transactionList"></ul>
    </div>

    <div>
        <h3>Statistics</h3>
        <p>Total Income: <span id="totalIncome">0</span></p>
        <p>Total Expense: <span id="totalExpense">0</span></p>
    </div>

    <script>
        let balance = 0;
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        function updateBalance() {
            document.getElementById('balance').innerText = balance;
        }

        function updateTransactionList() {
            const list = document.getElementById('transactionList');
            list.innerHTML = '';
            transactions.forEach((transaction, index) => {
                const li = document.createElement('li');
                li.innerText = `${transaction.name}: ${transaction.amount} (${transaction.type})`;
                const deleteButton = document.createElement('button');
                deleteButton.innerText = 'Delete';
                deleteButton.addEventListener('click', () => {
                    transactions.splice(index, 1);
                    localStorage.setItem('transactions', JSON.stringify(transactions));
                    updateTransactionList();
                    updateStatistics();
                });
                li.appendChild(deleteButton);
                list.appendChild(li);
            });
        }

        function updateStatistics() {
            const totalIncome = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + parseFloat(t.amount), 0);
            const totalExpense = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + parseFloat(t.amount), 0);
            document.getElementById('totalIncome').innerText = totalIncome;
            document.getElementById('totalExpense').innerText = totalExpense;
            balance = totalIncome - totalExpense;
            updateBalance();
        }

        document.getElementById('transactionForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('transactionName').value;
            const amount = parseFloat(document.getElementById('transactionAmount').value);
            const type = amount >= 0 ? 'income' : 'expense';
            transactions.push({ name, amount, type });
            localStorage.setItem('transactions', JSON.stringify(transactions));
            updateTransactionList();
            updateStatistics();
            e.target.reset();
        });

        document.getElementById('filter').addEventListener('change', (e) => {
            const filterValue = e.target.value;
            // Implement filtering logic here if needed
        });

        updateTransactionList();
        updateStatistics();
    </script>
</body>
</html>
