<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Tracker - My Website</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        input, select, button { padding: 10px; width: 100%; box-sizing: border-box; margin-top: 5px; }
        .btn-add { background-color: #28a745; color: white; border: none; cursor: pointer; }
        .btn-print { background-color: #007bff; color: white; border: none; cursor: pointer; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f8f9fa; }
        .cash-in { color: green; font-weight: bold; }
        .cash-out { color: red; font-weight: bold; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Cash Tracker</h2>
    
    <div class="no-print">
        <div class="form-group">
            <label>Description:</label>
            <input type="text" id="desc" placeholder="Kihnu ditte ya kithon aaye?">
        </div>
        <div class="form-group">
            <label>Amount:</label>
            <input type="number" id="amount" placeholder="Paisa (₹)">
        </div>
        <div class="form-group">
            <label>Type:</label>
            <select id="type">
                <option value="In">Cash In (+)</option>
                <option value="Out">Cash Out (-)</option>
            </select>
        </div>
        <button class="btn-add" onclick="addTransaction()">Add Transaction</button>
        <button class="btn-print" onclick="window.print()">Print Report</button>
    </div>

    <hr class="no-print">

    <div class="no-print">
        <label>Filter by Date:</label>
        <input type="date" id="filterDate" onchange="filterTransactions()">
    </div>

    <table id="transactionTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Type</th>
                <th>Amount</th>
                <th class="no-print">WhatsApp</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    let transactions = [];

    function addTransaction() {
        const desc = document.getElementById('desc').value;
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;
        const date = new Date().toLocaleDateString();

        if(!desc || !amount) { alert("Please fill all fields"); return; }

        const entry = { date, desc, amount, type };
        transactions.push(entry);
        renderTable(transactions);
        
        // Reset inputs
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        data.forEach((item, index) => {
            const row = `<tr>
                <td>${item.date}</td>
                <td>${item.desc}</td>
                <td class="${item.type === 'In' ? 'cash-in' : 'cash-out'}">${item.type}</td>
                <td>₹${item.amount}</td>
                <td class="no-print">
                    <button onclick="shareWhatsApp('${item.desc}', '${item.amount}', '${item.type}')">Send 📱</button>
                </td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    function shareWhatsApp(desc, amt, type) {
        const msg = `Transaction Detail: \nDescription: ${desc} \nAmount: ₹${amt} \nType: ${type}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function filterTransactions() {
        const filterVal = document.getElementById('filterDate').value;
        // In real app, date logic would filter the 'transactions' array
        alert("Filter feature active! Tusi backend naal connect karke date filter kar sakde ho.");
    }
</script>

</body>
</html>
