<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHREE RAM TRADING COMPANY</title>
    <style>
        :root { --primary: #1a237e; --secondary: #2e7d32; --danger: #c62828; --whatsapp: #25D366; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; }
        .container { max-width: 600px; background: white; padding: 15px; margin: auto; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); text-transform: uppercase; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .balance-card { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .box { padding: 10px; border-radius: 8px; text-align: center; color: white; font-weight: bold; }
        .in-box { background: var(--secondary); }
        .out-box { background: var(--danger); }
        .net-box { background: var(--primary); grid-column: span 2; font-size: 1.1rem; }
        .form-group { display: flex; flex-direction: column; gap: 8px; background: #fffde7; padding: 15px; border-radius: 10px; border: 1px solid #fbc02d; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .btn-save { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; font-size: 13px; }
        th { background: #f1f1f1; color: var(--primary); }
        .amt-in { color: var(--secondary); font-weight: bold; }
        .amt-out { color: var(--danger); font-weight: bold; }
        .btn-action { padding: 5px 8px; border-radius: 4px; border: none; color: white; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-delete { background: var(--danger); }
        #status { text-align: center; display: none; margin: 10px; font-weight: bold; color: #f39c12; }
    </style>
</head>
<body>

<div class="container">
    <h2>SHREE RAM TRADING</h2>
    <div class="balance-card">
        <div class="box in-box">Total In<br>₹<span id="tIn">0</span></div>
        <div class="box out-box">Total Out<br>₹<span id="tOut">0</span></div>
        <div class="box net-box">Net Balance: ₹<span id="tNet">0</span></div>
    </div>

    <div class="form-group">
        <input type="date" id="date">
        <input type="text" id="desc" placeholder="Details">
        <input type="number" id="amount" placeholder="Amount">
        <select id="type">
            <option value="in">Cash In (+)</option>
            <option value="out">Cash Out (-)</option>
        </select>
        <button class="btn-save" id="saveBtn" onclick="saveToSheet()">SAVE ENTRY</button>
    </div>

    <div id="status">Wait... Processing</div>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Details</th>
                <th>Amt</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="logTable"></tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxE9IcWP_uixH-vRcOyL-185kvqKIOaBKomBGDfX-yEhoaKb0Uc9RFM2qCKQOwihV0/exec'; 

    async function loadData() {
        document.getElementById('status').style.display = 'block';
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            renderTable(data);
        } catch (e) { console.log("Load Error"); }
        document.getElementById('status').style.display = 'none';
    }

    function renderTable(data) {
        const table = document.getElementById('logTable');
        table.innerHTML = '';
        let tIn = 0, tOut = 0;

        [...data].reverse().forEach(item => {
            let val = parseFloat(item.amount) || 0;
            let isIn = item.type === 'in';
            table.innerHTML += `<tr>
                <td>${item.date}</td>
                <td>${item.desc}</td>
                <td class="${isIn ? 'amt-in' : 'amt-out'}">${isIn ? '+' : '-'}${val}</td>
                <td><button class="btn-action btn-delete" onclick="deleteEntry(${item.row})">Del</button></td>
            </tr>`;
            if(isIn) tIn += val; else tOut += val;
        });

        document.getElementById('tIn').innerText = tIn.toLocaleString('en-IN');
        document.getElementById('tOut').innerText = tOut.toLocaleString('en-IN');
        document.getElementById('tNet').innerText = (tIn - tOut).toLocaleString('en-IN');
    }

    async function saveToSheet() {
        const payload = {
            date: document.getElementById('date').value,
            desc: document.getElementById('desc').value,
            amount: document.getElementById('amount').value,
            type: document.getElementById('type').value
        };
        if(!payload.date || !payload.desc || !payload.amount) return alert("All fields required!");

        document.getElementById('status').style.display = 'block';
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        
        setTimeout(() => {
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            loadData();
            alert("Entry Saved!");
        }, 1500);
    }

    async function deleteEntry(rowIdx) {
        if(!confirm("Kya aap is entry ko permanent delete karna chahte hain?")) return;
        document.getElementById('status').style.display = 'block';
        
        await fetch(SCRIPT_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ action: "delete", row: rowIdx }) 
        });

        setTimeout(() => {
            loadData();
            alert("Entry Deleted!");
        }, 1500);
    }

    document.getElementById('date').valueAsDate = new Date();
    loadData();
</script>
</body>
</html>
