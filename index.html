<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Delete and History System</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { display: flex; gap: 50px; }
        .box { background: white; padding: 20px; border-radius: 8px; width: 300px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        ul { list-style: none; padding: 0; }
        li { background: #eee; margin: 10px 0; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
        button { cursor: pointer; border: none; border-radius: 4px; padding: 5px 10px; }
        .del-btn { background: #ff4d4d; color: white; }
        .restore-btn { background: #28a745; color: white; }
        .empty-msg { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <h1>Data Management System</h1>

    <div class="container">
        <div class="box">
            <h2>Active Entries</h2>
            <ul id="mainList">
                <li id="item-1">Item 1 <button class="del-btn" onclick="moveToHistory('item-1', 'Item 1')">Delete</button></li>
                <li id="item-2">Item 2 <button class="del-btn" onclick="moveToHistory('item-2', 'Item 2')">Delete</button></li>
                <li id="item-3">Item 3 <button class="del-btn" onclick="moveToHistory('item-3', 'Item 3')">Delete</button></li>
            </ul>
        </div>

        <div class="box">
            <h2>Deleted History</h2>
            <ul id="historyList">
                <p id="no-history" class="empty-msg">Koi deleted entry nahi hai.</p>
            </ul>
        </div>
    </div>

    <script>
        function moveToHistory(id, name) {
            // 1. Purani entry ko main list se hatana
            const element = document.getElementById(id);
            element.remove();

            // 2. "No history" message ko chupana
            document.getElementById('no-history').style.display = 'none';

            // 3. Nayi entry history list mein add karna
            const historyList = document.getElementById('historyList');
            const li = document.createElement('li');
            li.innerHTML = `${name} <span style="font-size: 10px; color: gray;">(Deleted)</span>`;
            
            historyList.appendChild(li);
            
            console.log(name + " history mein bhej diya gaya hai.");
        }
    </script>

</body>
</html>
