<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHREE RAM TRADING COMPANY</title>
    <style>
        :root { --primary: #1a237e; --secondary: #2e7d32; --danger: #c62828; --whatsapp: #25D366; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; }
        .container { max-width: 600px; background: white; padding: 20px; margin: auto; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-top: 0; text-transform: uppercase; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        @media print { .no-print { display: none !important; } .container { box-shadow: none; border: none; width: 100%; } }

        .balance-card { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .box { padding: 12px; border-radius: 8px; text-align: center; color: white; font-weight: bold; }
        .in-box { background: var(--secondary); }
        .out-box { background: var(--danger); }
        .net-box { background: var(--primary); grid-column: span 2; font-size: 1.2rem; }

        .form-group { display: flex; flex-direction: column; gap: 8px; background: #fffde7; padding: 15px; border-radius: 10px; border: 1px solid #fbc02d; }
        input, select, button { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .btn-save { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; font-size: 13px; }
        th { background: #f1f1f1; color: var(--primary); }
        .amt-in { color: var(--secondary); font-weight: bold; }
        .amt-out { color: var(--danger); font-weight: bold; }
        
        .btn-action { padding: 5px 8px; border-radius: 4px; border: none; color: white; cursor: pointer; font-size: 11px; margin-right: 2px; font-weight: bold; }
        .btn-print { background: #fb8c00; }
        .btn-whatsapp { background: var(--whatsapp); }
        .btn-delete { background: var(--danger); }
        #status { text-align: center; display: none; margin: 10px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container" id="main-content">
    <div class="no-print">
        <h2>SHREE RAM TRADING COMPANY</h2>

        <div class="balance-card">
            <div class="box in-box">In: ₹<span id="tIn">0</span></div>
            <div class="box out-box">Out: ₹<span id="tOut">0</span></div>
            <div class="box net-box">Net Balance: ₹<span id="tNet">0</span></div>
        </div>

        <div class="form-group">
            <input type="date" id="date">
            <input type="text" id="desc" placeholder="Details likho">
            <input type="number" id="amount" placeholder="Amount (₹)">
            <select id="type">
                <option value="in">Cash In (+)</option>
                <option value="out">Cash Out (-)</option>
            </select>
            <button class="btn-save" id="saveBtn" onclick="saveToSheet()">SAVE ENTRY</button>
        </div>
    </div>

    <div id="status">Updating... Please wait.</div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Details</th>
                    <th>Amt</th>
                    <th class="no-print">Actions</th>
                </tr>
            </thead>
            <tbody id="logTable"></tbody>
        </table>
    </div>
</div>

<div id="receipt-print" style="display:none; text-align:center; border:2px solid #000; padding:20px; width:300px; margin:auto;">
    <h2>SHREE RAM TRADING COMPANY</h2>
    <hr>
    <h3>RECEIPT</h3>
    <p id="r-date"></p>
    <p id="r-desc"></p>
    <p id="r-type"></p>
    <h2 id="r-amount"></h2>
    <hr>
    <p>Signature</p>
</div>

<script>
    // ********* APNA URL ETHE PASTE KARO *********
    const SCRIPT_URL = 'APNA_NEW_URL_HERE'; 

    let globalData = [];

    async function loadData() {
        document.getElementById('status').style.display = 'block';
        try {
            const res = await fetch(SCRIPT_URL);
            globalData = await res.json();
            renderTable(globalData);
        } catch (e) { console.log("Error loading data"); }
        document.getElementById('status').style.display = 'none';
    }

    function renderTable(data) {
        const table = document.getElementById('logTable');
        table.innerHTML = '';
        let totalIn = 0, totalOut = 0;

        const displayData = [...data].reverse();

        displayData.forEach((item) => {
            let val = parseFloat(item.amount) || 0;
            let isIn = item.type === 'in';
            
            let row = `<tr>
                <td>${item.date}</td>
                <td>${item.desc}</td>
                <td class="${isIn ? 'amt-in' : 'amt-out'}">${isIn ? '+' : '-'}${val}</td>
                <td class="no-print">
                    <button class="btn-action btn-whatsapp" onclick="shareWhatsapp(${item.row})">WA</button>
                    <button class="btn-action btn-print" onclick="printSingle(${item.row})">Print</button>
                    <button class="btn-action btn-delete" onclick="deleteEntry(${item.row})">Del</button>
                </td>
            </tr>`;
            table.innerHTML += row;

            if(isIn) totalIn += val; else totalOut += val;
        });

        document.getElementById('tIn').innerText = totalIn;
        document.getElementById('tOut').innerText = totalOut;
        document.getElementById('tNet').innerText = totalIn - totalOut;
    }

    async function saveToSheet() {
        const date = document.getElementById('date').value;
        const desc = document.getElementById('desc').value;
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;

        if(!date || !desc || !amount) return alert("Sari jankari bharo!");

        document.getElementById('saveBtn').disabled = true;
        document.getElementById('status').style.display = 'block';

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ date, desc, amount, type })
            });

            setTimeout(() => {
                document.getElementById('desc').value = '';
                document.getElementById('amount').value = '';
                loadData();
                document.getElementById('saveBtn').disabled = false;
                alert("Saved!");
            }, 2000);
        } catch (e) { alert("Error!"); }
    }

    async function deleteEntry(rowIdx) {
        if(!confirm("Ki tusi delete karna chahunde ho?")) return;
        document.getElementById('status').style.display = 'block';
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "delete", row: rowIdx })
            });
            setTimeout(() => { loadData(); alert("Deleted!"); }, 2000);
        } catch (e) { alert("Error!"); }
    }

    function shareWhatsapp(idx) {
        const item = globalData.find(d => d.row === idx);
        const msg = `*SHREE RAM TRADING COMPANY*%0A*Date:* ${item.date}%0A*Details:* ${item.desc}%0A*Amt:* ₹${item.amount}`;
        window.open(`https://api.whatsapp.com/send?text=${msg}`, '_blank');
    }

    function printSingle(idx) {
        const item = globalData.find(d => d.row === idx);
        document.getElementById('r-date').innerText = "Date: " + item.date;
        document.getElementById('r-desc').innerText = "Details: " + item.desc;
        document.getElementById('r-type').innerText = "Type: " + (item.type === 'in' ? 'Received' : 'Paid');
        document.getElementById('r-amount').innerText = "₹" + item.amount;
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('receipt-print').style.display = 'block';
        window.print();
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('receipt-print').style.display = 'none';
    }

    document.getElementById('date').valueAsDate = new Date();
    loadData();
</script>

</body>
</html>
