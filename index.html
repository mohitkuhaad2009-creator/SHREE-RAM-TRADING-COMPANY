<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHREE RAM TRADING COMPANY - Ledger</title>
    <style>
        :root { --primary: #1a237e; --secondary: #2e7d32; --danger: #c62828; --whatsapp: #25D366; --warning: #fb8c00; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 600px; background: white; padding: 20px; margin: auto; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; text-transform: uppercase; }
        
        @media print { .no-print { display: none !important; } .container { box-shadow: none; border: none; width: 100%; max-width: 100%; } }

        .balance-card { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .box { padding: 15px; border-radius: 12px; text-align: center; color: white; font-weight: bold; }
        .in-box { background: var(--secondary); }
        .out-box { background: var(--danger); }
        .net-box { background: var(--primary); grid-column: span 2; font-size: 1.2rem; }

        /* Filter Section Styling */
        .filter-section { background: #e3f2fd; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-section input, .filter-section select { flex: 1; min-width: 120px; padding: 8px; border: 1px solid #90caf9; }

        .form-group { display: flex; flex-direction: column; gap: 10px; background: #fffde7; padding: 15px; border-radius: 12px; border: 1px solid #fbc02d; margin-bottom: 20px; }
        input, select, button { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; }
        .btn-save { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px 8px; text-align: left; font-size: 14px; }
        th { background: #f8f9fa; color: var(--primary); }
        .amt-in { color: var(--secondary); font-weight: bold; }
        .amt-out { color: var(--danger); font-weight: bold; }
        
        .action-btns { display: flex; gap: 4px; }
        .btn-action { padding: 6px; border-radius: 6px; border: none; color: white; cursor: pointer; font-size: 12px; font-weight: bold; min-width: 35px; }
        .btn-print { background: var(--warning); }
        .btn-whatsapp { background: var(--whatsapp); }
        .btn-delete { background: var(--danger); }
        
        #status { text-align: center; display: none; margin: 10px; color: var(--primary); font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container" id="main-content">
    <div class="no-print">
        <h2>SHREE RAM TRADING COMPANY</h2>

        <div class="balance-card">
            <div class="box in-box">Total In<br>₹<span id="tIn">0</span></div>
            <div class="box out-box">Total Out<br>₹<span id="tOut">0</span></div>
            <div class="box net-box">Net Balance: ₹<span id="tNet">0</span></div>
        </div>

        <div class="filter-section">
            <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="🔍 Search Details (Name)...">
            <select id="filterType" onchange="applyFilters()">
                <option value="all">All Entries</option>
                <option value="in">Cash In Only</option>
                <option value="out">Cash Out Only</option>
            </select>
        </div>

        <div class="form-group">
            <input type="date" id="date">
            <input type="text" id="desc" placeholder="Details (Kise diya / Kahan se aaya)">
            <input type="number" id="amount" placeholder="Amount (₹)">
            <select id="type">
                <option value="in">Cash In (+)</option>
                <option value="out">Cash Out (-)</option>
            </select>
            <button class="btn-save" id="saveBtn" onclick="saveToSheet()">SAVE TO CLOUD</button>
        </div>
    </div>

    <div id="status">Syncing with Google Sheets...</div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Details</th>
                    <th>Amount</th>
                    <th class="no-print">Actions</th>
                </tr>
            </thead>
            <tbody id="logTable"></tbody>
        </table>
    </div>
</div>

<div id="receipt-print" style="display:none; text-align:center; border:2px solid #000; padding:25px; width:300px; margin:auto; font-family: 'Courier New', Courier, monospace;">
    <h2 style="margin:0;">SHREE RAM TRADING COMPANY</h2>
    <p style="margin:5px 0;">Official Cash Receipt</p>
    <hr>
    <div style="text-align:left; line-height: 1.6;">
        <p id="r-date"></p>
        <p id="r-desc"></p>
        <p id="r-type" style="font-weight:bold;"></p>
        <h1 id="r-amount" style="background:#eee; text-align:center; padding:10px; border:1px dashed #000;"></h1>
    </div>
    <hr>
    <p style="margin-top:40px;">Authorized Signature</p>
</div>

<script>
    // APNA SCRIPT URL YAHAN DALEIN
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwvOqXMUITgWoMYvqi-bnjYoKOJwsBurffeCmX_Uu0yG0fzaS7fC_glsbituXoFI8b8/exec'; 

    let globalData = [];

    async function loadData() {
        document.getElementById('status').style.display = 'block';
        try {
            const res = await fetch(SCRIPT_URL);
            globalData = await res.json();
            renderTable(globalData);
        } catch (e) { console.error("Data fetch failed"); }
        document.getElementById('status').style.display = 'none';
    }

    // FILTER LOGIC
    function applyFilters() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const typeFilter = document.getElementById('filterType').value;

        const filteredData = globalData.filter(item => {
            const matchSearch = item.desc.toLowerCase().includes(searchText);
            const matchType = (typeFilter === 'all') || (item.type === typeFilter);
            return matchSearch && matchType;
        });

        renderTable(filteredData);
    }

    function renderTable(data) {
        const table = document.getElementById('logTable');
        table.innerHTML = '';
        let totalIn = 0, totalOut = 0;

        const displayData = [...data].reverse();

        displayData.forEach((item) => {
            let val = parseFloat(item.amount) || 0;
            let isIn = item.type === 'in';
            
            let row = `<tr>
                <td>${item.date}</td>
                <td>${item.desc}</td>
                <td class="${isIn ? 'amt-in' : 'amt-out'}">${isIn ? '+' : '-'}${val}</td>
                <td class="no-print">
                    <div class="action-btns">
                        <button class="btn-action btn-whatsapp" onclick="shareWhatsapp(${item.row})" title="WhatsApp">WA</button>
                        <button class="btn-action btn-print" onclick="printSingle(${item.row})" title="Print">PR</button>
                        <button class="btn-action btn-delete" onclick="deleteEntry(${item.row})" title="Delete">DEL</button>
                    </div>
                </td>
            </tr>`;
            table.innerHTML += row;

            if(isIn) totalIn += val; else totalOut += val;
        });

        document.getElementById('tIn').innerText = totalIn.toLocaleString('en-IN');
        document.getElementById('tOut').innerText = totalOut.toLocaleString('en-IN');
        document.getElementById('tNet').innerText = (totalIn - totalOut).toLocaleString('en-IN');
    }

    // Save and Delete functions same as before...
    async function saveToSheet() {
        const date = document.getElementById('date').value;
        const desc = document.getElementById('desc').value;
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;
        if(!date || !desc || !amount) return alert("Fill all fields!");
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        document.getElementById('status').style.display = 'block';
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ date, desc, amount, type }) });
            setTimeout(() => { 
                document.getElementById('desc').value = ''; 
                document.getElementById('amount').value = '';
                loadData(); 
                saveBtn.disabled = false; 
            }, 1500);
        } catch (e) { alert("Error!"); saveBtn.disabled = false; }
    }

    async function deleteEntry(rowIdx) {
        if(!confirm("Delete this entry?")) return;
        document.getElementById('status').style.display = 'block';
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "delete", row: rowIdx }) });
            setTimeout(() => { loadData(); }, 1500);
        } catch (e) { alert("Fail!"); }
    }

    function shareWhatsapp(idx) {
        const item = globalData.find(d => d.row === idx);
        const msg = `*SHREE RAM TRADING*%0AData: ${item.date}%0AAmount: ₹${item.amount}`;
        window.open(`https://api.whatsapp.com/send?text=${msg}`, '_blank');
    }

    function printSingle(idx) {
        const item = globalData.find(d => d.row === idx);
        document.getElementById('r-date').innerText = "Date: " + item.date;
        document.getElementById('r-desc').innerText = "Details: " + item.desc;
        document.getElementById('r-type').innerText = "Status: " + (item.type === 'in' ? 'Received' : 'Paid');
        document.getElementById('r-amount').innerText = "₹" + item.amount;
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('receipt-print').style.display = 'block';
        window.print();
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('receipt-print').style.display = 'none';
    }

    document.getElementById('date').valueAsDate = new Date();
    loadData();
</script>

</body>
</html>
