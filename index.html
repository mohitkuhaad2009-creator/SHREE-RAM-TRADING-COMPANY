<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shri Ram Trading - Cloud Ledger</title>
    <style>
        :root { --primary: #1a237e; --secondary: #2e7d32; --danger: #c62828; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; }
        .container { max-width: 600px; background: white; padding: 20px; margin: auto; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-top: 0; }
        
        /* Print Styles */
        @media print {
            .no-print { display: none !important; }
            .container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
            .print-only { display: block !important; }
        }

        .balance-card { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .box { padding: 12px; border-radius: 8px; text-align: center; color: white; font-weight: bold; }
        .in-box { background: var(--secondary); }
        .out-box { background: var(--danger); }
        .net-box { background: var(--primary); grid-column: span 2; }

        .form-group { display: flex; flex-direction: column; gap: 8px; background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #ddd; }
        input, select, button { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .btn-save { background: var(--primary); color: white; border: none; cursor: pointer; }
        .btn-print-all { background: #546e7a; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; margin-top: 10px; width: 100%; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; font-size: 13px; }
        th { background: #f1f1f1; }
        .amt-in { color: var(--secondary); font-weight: bold; }
        .amt-out { color: var(--danger); font-weight: bold; }
        .print-row-btn { background: #fb8c00; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        /* Receipt Design for Printing */
        #receipt-box { display: none; padding: 30px; border: 2px solid #000; margin: 20px; }
    </style>
</head>
<body>

<div class="container" id="main-content">
    <div class="no-print">
        <h2>Shri Ram Trading Co.</h2>

        <div class="balance-card">
            <div class="box in-box">In: ₹<span id="tIn">0</span></div>
            <div class="box out-box">Out: ₹<span id="tOut">0</span></div>
            <div class="box net-box">Net Balance: ₹<span id="tNet">0</span></div>
        </div>

        <div class="form-group">
            <input type="date" id="date">
            <input type="text" id="desc" placeholder="Details (Kise diya/liya)">
            <input type="number" id="amount" placeholder="Amount (₹)">
            <select id="type">
                <option value="in">Cash In (+)</option>
                <option value="out">Cash Out (-)</option>
            </select>
            <button class="btn-save" id="saveBtn" onclick="saveToSheet()">Save Entry</button>
        </div>
        
        <button class="btn-print-all" onclick="window.print()">Print Full History</button>
    </div>

    <div id="status" style="text-align:center; display:none; margin:10px;">Syncing...</div>

    <div class="table-container">
        <h3 class="print-only" style="display:none; text-align:center;">Shri Ram Trading - Transaction Report</h3>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Details</th>
                    <th>Amount</th>
                    <th class="no-print">Print</th>
                </tr>
            </thead>
            <tbody id="logTable"></tbody>
        </table>
    </div>
</div>

<div id="receipt-print" style="display:none;">
    <div style="text-align:center; border:2px solid #000; padding:20px; width:300px; margin:auto;">
        <h2>Shri Ram Trading Co.</h2>
        <p>----------------------------</p>
        <h3>CASH RECEIPT</h3>
        <p id="r-date"></p>
        <p id="r-desc"></p>
        <p id="r-type"></p>
        <h2 id="r-amount"></h2>
        <p>----------------------------</p>
        <p>Signature: ___________</p>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz40Wjy-WphlcFwjSQTUFVZsJA_iuDoMqJn_iSHAeQUTFv_o-noNsz0iXTcrR3qX_HK/exec';
    let globalData = [];

    async function loadData() {
        document.getElementById('status').style.display = 'block';
        try {
            const res = await fetch(SCRIPT_URL);
            globalData = await res.json();
            renderTable(globalData);
            document.getElementById('status').style.display = 'none';
        } catch (e) { alert("Data load nahi hua!"); }
    }

    function renderTable(data) {
        const table = document.getElementById('logTable');
        table.innerHTML = '';
        let totalIn = 0, totalOut = 0;

        data.reverse().forEach((item, index) => {
            let val = parseFloat(item.amount) || 0;
            let isIn = item.type === 'in';
            
            let row = `<tr>
                <td>${item.date}</td>
                <td>${item.desc}</td>
                <td class="${isIn ? 'amt-in' : 'amt-out'}">${isIn ? '+' : '-'}${val}</td>
                <td class="no-print">
                    <button class="print-row-btn" onclick="printSingle(${index})">Print</button>
                </td>
            </tr>`;
            table.innerHTML += row;

            if(isIn) totalIn += val; else totalOut += val;
        });

        document.getElementById('tIn').innerText = totalIn;
        document.getElementById('tOut').innerText = totalOut;
        document.getElementById('tNet').innerText = totalIn - totalOut;
    }

    async function saveToSheet() {
        const date = document.getElementById('date').value;
        const desc = document.getElementById('desc').value;
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;

        if(!date || !desc || !amount) return alert("Details bharein!");

        document.getElementById('saveBtn').disabled = true;
        
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ date, desc, amount, type })
            });

            setTimeout(() => {
                document.getElementById('desc').value = '';
                document.getElementById('amount').value = '';
                loadData();
                document.getElementById('saveBtn').disabled = false;
                alert("Saved!");
            }, 2000);
        } catch (e) { alert("Error!"); }
    }

    // Single Receipt Print Function
    function printSingle(index) {
        const item = globalData[index];
        document.getElementById('r-date').innerText = "Date: " + item.date;
        document.getElementById('r-desc').innerText = "Details: " + item.desc;
        document.getElementById('r-type').innerText = "Type: " + (item.type === 'in' ? 'Received' : 'Paid');
        document.getElementById('r-amount').innerText = "Total: ₹" + item.amount;

        // Hide main UI and show receipt for printing
        document.getElementById('main-content').classList.add('no-print');
        document.getElementById('receipt-print').style.display = 'block';
        
        window.print();

        // Restore UI after print
        document.getElementById('main-content').classList.remove('no-print');
        document.getElementById('receipt-print').style.display = 'none';
    }

    document.getElementById('date').valueAsDate = new Date();
    loadData();
</script>

</body>
</html>
