<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Shri Ram Trading Company - Cash Book</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 800px; background: white; padding: 20px; margin: auto; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #d32f2f; }
        .balance-box { display: flex; justify-content: space-around; margin-bottom: 20px; background: #e3f2fd; padding: 15px; border-radius: 5px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { cursor: pointer; background: #2e7d32; color: white; border: none; }
        button.out { background: #c62828; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .cash-in { color: green; font-weight: bold; }
        .cash-out { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Shri Ram Trading Company</h2>
    
    <div class="balance-box">
        <div><strong>Total Cash In:</strong> ₹<span id="totalIn">0</span></div>
        <div><strong>Total Cash Out:</strong> ₹<span id="totalOut">0</span></div>
        <div><strong>Net Balance:</strong> ₹<span id="netBalance">0</span></div>
    </div>

    <div class="input-group">
        <input type="date" id="date">
        <input type="text" id="desc" placeholder="Details (Kahan se aaya/gaya)">
        <input type="number" id="amount" placeholder="Amount (₹)">
        <select id="type">
            <option value="in">Cash In (+)</option>
            <option value="out">Cash Out (-)</option>
        </select>
        <button onclick="addEntry()">Entry Save Karein</button>
    </div>

    <h3>Transaction History</h3>
    <table id="historyTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Type</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
    <br>
    <button onclick="clearData()" style="background: gray;">Clear All History</button>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem('cashData')) || [];

    function updateUI() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';
        let tIn = 0; let tOut = 0;

        entries.forEach((item, index) => {
            let row = `<tr>
                <td>${item.date}</td>
                <td>${item.desc}</td>
                <td class="${item.type === 'in' ? 'cash-in' : 'cash-out'}">${item.type.toUpperCase()}</td>
                <td>₹${item.amount}</td>
            </tr>`;
            tableBody.innerHTML += row;

            if(item.type === 'in') tIn += parseFloat(item.amount);
            else tOut += parseFloat(item.amount);
        });

        document.getElementById('totalIn').innerText = tIn;
        document.getElementById('totalOut').innerText = tOut;
        document.getElementById('netBalance').innerText = tIn - tOut;
    }

    function addEntry() {
        const date = document.getElementById('date').value;
        const desc = document.getElementById('desc').value;
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;

        if(!date || !desc || !amount) { alert("Please fill all fields"); return; }

        entries.push({ date, desc, amount, type });
        localStorage.setItem('cashData', JSON.stringify(entries));
        updateUI();
    }

    function clearData() {
        if(confirm("Kya aap saari history delete karna chahte hain?")) {
            localStorage.clear();
            entries = [];
            updateUI();
        }
    }

    updateUI(); // Load data on start
</script>

</body>
</html>
