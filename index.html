<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Param Shriram Trading - Cash Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .balance-card { background: #28a745; color: white; padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 20px; }
        .balance-card h1 { margin: 0; font-size: 2.5rem; }
        .form-group { margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
        .text-in { color: green; font-weight: bold; }
        .text-out { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Param Shriram Trading Co.</h2>
    
    <div class="balance-card">
        <p>Total Cash in Hand</p>
        <h1 id="totalBalance">₹0</h1>
    </div>

    <div class="form-group">
        <input type="number" id="amount" placeholder="Amount (₹) bharyo">
        <select id="type">
            <option value="in">Cash In (Kamayi)</option>
            <option value="out">Cash Out (Kharcha)</option>
        </select>
        <input type="text" id="remark" placeholder="Remark (Kihnu dite/kiton aaye)">
        <button onclick="addTransaction()">Add Entry</button>
    </div>

    <h3>Recent Transactions</h3>
    <table id="transactionTable">
        <thead>
            <tr>
                <th>Details</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody id="historyBody">
            </tbody>
    </table>
</div>

<script>
    let total = 0;

    function addTransaction() {
        const amount = parseFloat(document.getElementById('amount').value);
        const type = document.getElementById('type').value;
        const remark = document.getElementById('remark').value;

        if (isNaN(amount) || amount <= 0) {
            alert("Please sahi amount bharyo!");
            return;
        }

        // Update Total
        if (type === 'in') {
            total += amount;
        } else {
            total -= amount;
        }

        // Update Balance Display
        document.getElementById('totalBalance').innerText = "₹" + total;

        // Add to Table
        const tableBody = document.getElementById('historyBody');
        const row = tableBody.insertRow(0);
        
        const cell1 = row.insertCell(0);
        const cell2 = row.insertCell(1);

        cell1.innerHTML = `<strong>${remark || 'No Remark'}</strong><br><small>${new Date().toLocaleDateString()}</small>`;
        cell2.innerHTML = `<span class="${type === 'in' ? 'text-in' : 'text-out'}">${type === 'in' ? '+' : '-'} ₹${amount}</span>`;

        // Clear Inputs
        document.getElementById('amount').value = '';
        document.getElementById('remark').value = '';
    }
</script>

</body>
</html>
