<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Tracker - Shree Ram Trading Company</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #d32f2f; margin-bottom: 5px; }
        h2 { text-align: center; color: #555; font-size: 1.2rem; margin-top: 0; }
        .balance-card { background: #2e7d32; color: white; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #d32f2f; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #b71c1c; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #ddd; padding: 12px; text-align: left; }
        .credit { color: #2e7d32; font-weight: bold; }
        .debit { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>SHREE RAM TRADING COMPANY</h1>
    <h2>Daily Cash Tracker</h2>

    <div class="balance-card">
        <h3>Total Balance</h3>
        <p id="totalBalance" style="font-size: 24px;">₹ 0.00</p>
    </div>

    <div class="form-group">
        <label>Transaction Name</label>
        <input type="text" id="name" placeholder="e.g. Sales, Rent, Party Payment">
    </div>
    <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="amount" placeholder="0.00">
    </div>
    <div class="form-group">
        <label>Type</label>
        <select id="type">
            <option value="credit">Income (Credit)</option>
            <option value="debit">Expense (Debit)</option>
        </select>
    </div>
    <button onclick="addTransaction()">Add Entry</button>

    <table>
        <thead>
            <tr>
                <th>Details</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody id="transactionList"></tbody>
    </table>
</div>

<script>
    let totalBalance = 0;

    function addTransaction() {
        const name = document.getElementById('name').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const type = document.getElementById('type').value;

        if (name === "" || isNaN(amount)) {
            alert("Kripya sahi detail bharo!");
            return;
        }

        const list = document.getElementById('transactionList');
        const row = list.insertRow();
        
        // Update Balance
        if (type === 'credit') {
            totalBalance += amount;
            row.innerHTML = `<td>${name}</td><td class="credit">+ ₹${amount}</td>`;
        } else {
            totalBalance -= amount;
            row.innerHTML = `<td>${name}</td><td class="debit">- ₹${amount}</td>`;
        }

        document.getElementById('totalBalance').innerText = `₹ ${totalBalance.toFixed(2)}`;

        // Clear Inputs
        document.getElementById('name').value = "";
        document.getElementById('amount').value = "";
    }
</script>

</body>
</html>
