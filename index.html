<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Cash Book - Dark Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #121212;
            --card-bg: #1e1e1e;
            --primary-gold: #ffcc00;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --success: #00e676;
            --danger: #ff5252;
            --border: #333;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-body); 
            color: var(--text-main); 
            margin: 0; padding: 20px; 
        }

        .container { max-width: 1000px; margin: auto; }

        /* Header & Stats */
        .header-title { text-align: center; color: var(--primary-gold); margin-bottom: 30px; letter-spacing: 1px; }
        
        .dashboard { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; margin-bottom: 30px; 
        }

        .stat-box { 
            background: var(--card-bg); padding: 25px; border-radius: 15px; 
            border: 1px solid var(--border); text-align: center;
            transition: transform 0.3s;
        }
        .stat-box:hover { transform: translateY(-5px); border-color: var(--primary-gold); }
        .stat-box h3 { margin: 0; font-size: 14px; color: var(--text-dim); text-transform: uppercase; }
        .stat-box p { margin: 10px 0 0; font-size: 28px; font-weight: 600; }

        /* Form Styling */
        .entry-card { 
            background: var(--card-bg); padding: 30px; border-radius: 15px; 
            margin-bottom: 30px; border: 1px solid var(--border);
        }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--primary-gold); }
        
        input, select { 
            width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid var(--border); 
            border-radius: 8px; color: white; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary-gold); }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { 
            flex: 1; padding: 15px; border: none; border-radius: 8px; 
            font-weight: 600; cursor: pointer; transition: 0.3s; 
        }
        .btn-add { background: var(--primary-gold); color: #000; }
        .btn-print { background: #333; color: #fff; }
        .btn:hover { opacity: 0.8; }

        /* History Table */
        .history-card { 
            background: var(--card-bg); border-radius: 15px; 
            border: 1px solid var(--border); overflow: hidden; 
        }
        
        .table-header { padding: 20px; background: #252525; display: flex; justify-content: space-between; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--primary-gold); border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid #252525; font-size: 14px; }
        
        .val-in { color: var(--success); font-weight: bold; }
        .val-out { color: var(--danger); font-weight: bold; }

        .action-icon { cursor: pointer; margin-right: 10px; text-decoration: none; }

        /* Print Mode - Automatic White Background */
        @media print {
            .no-print { display: none !important; }
            body { background: white; color: black; padding: 0; }
            .stat-box, .history-card { border: 1px solid #ccc; background: white; color: black; }
            .stat-box p, th, td, h3 { color: black !important; }
            table { border-collapse: collapse; }
            th, td { border: 1px solid #ddd; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="header-title no-print">GOLDEN CASH TRACKER</h1>

    <div class="dashboard">
        <div class="stat-box"><h3>Total Cash In</h3><p class="val-in" id="totalIn">₹0</p></div>
        <div class="stat-box"><h3>Total Cash Out</h3><p class="val-out" id="totalOut">₹0</p></div>
        <div class="stat-box"><h3>Available Balance</h3><p id="netBalance" style="color: var(--primary-gold);">₹0</p></div>
    </div>

    <div class="entry-card no-print">
        <div class="form-grid">
            <div><label>Date</label><input type="date" id="tDate"></div>
            <div><label>Description</label><input type="text" id="tDesc" placeholder="e.g. Office Rent"></div>
            <div><label>Amount (₹)</label><input type="number" id="tAmount" placeholder="0.00"></div>
            <div><label>Transaction Type</label>
                <select id="tType">
                    <option value="In">Cash In (+)</option>
                    <option value="Out">Cash Out (-)</option>
                </select>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-add" onclick="addEntry()">SAVE TRANSACTION</button>
            <button class="btn btn-print" onclick="window.print()">PRINT FULL REPORT</button>
        </div>
    </div>

    <div class="history-card">
        <div class="table-header no-print">
            <h3 style="color: white; margin:0;">Transaction History</h3>
            <input type="date" id="searchDate" onchange="loadTable()" style="width: auto; padding: 5px;">
        </div>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th class="no-print">Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    document.getElementById('tDate').valueAsDate = new Date();
    let db = JSON.parse(localStorage.getItem('goldCashData')) || [];

    function save() {
        localStorage.setItem('goldCashData', JSON.stringify(db));
        loadTable();
        updateStats();
    }

    function updateStats() {
        let cin = db.filter(x => x.type === 'In').reduce((s, x) => s + Number(x.amount), 0);
        let cout = db.filter(x => x.type === 'Out').reduce((s, x) => s + Number(x.amount), 0);
        document.getElementById('totalIn').innerText = `₹${cin.toLocaleString()}`;
        document.getElementById('totalOut').innerText = `₹${cout.toLocaleString()}`;
        document.getElementById('netBalance').innerText = `₹${(cin - cout).toLocaleString()}`;
    }

    function addEntry() {
        const date = document.getElementById('tDate').value;
        const desc = document.getElementById('tDesc').value;
        const amount = document.getElementById('tAmount').value;
        const type = document.getElementById('tType').value;

        if(!date || !desc || !amount) return alert("Please fill all details!");

        db.push({ id: Date.now(), date, desc, amount, type });
        document.getElementById('tDesc').value = '';
        document.getElementById('tAmount').value = '';
        save();
    }

    function deleteMe(id) {
        if(confirm("Delete this transaction?")) {
            db = db.filter(x => x.id !== id);
            save();
        }
    }

    function loadTable() {
        const body = document.getElementById('tableBody');
        const filter = document.getElementById('searchDate').value;
        body.innerHTML = '';

        let displayData = filter ? db.filter(x => x.date === filter) : db;
        displayData.sort((a,b) => new Date(b.date) - new Date(a.date));

        displayData.forEach(item => {
            body.innerHTML += `
                <tr>
                    <td>${item.date}</td>
                    <td>${item.desc}</td>
                    <td class="${item.type === 'In' ? 'val-in' : 'val-out'}">${item.type}</td>
                    <td>₹${Number(item.amount).toLocaleString()}</td>
                    <td class="no-print">
                        <a href="https://wa.me/?text=${encodeURIComponent('Cash Entry: '+item.desc+' | ₹'+item.amount)}" target="_blank" class="action-icon">📱</a>
                        <span class="action-icon" onclick="deleteMe(${item.id})" style="color:red;">🗑️</span>
                    </td>
                </tr>
            `;
        });
    }

    save(); // Initial call
</script>

</body>
</html>
