<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Cash Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Cash Tracker</h2>
        
        <div class="balance-container">
            <h4>Your Balance</h4>
            <h1 id="balance">₹0.00</h1>
        </div>

        <div class="input-section">
            <input type="text" id="description" placeholder="Description (e.g., Lunch, Salary)">
            <input type="number" id="amount" placeholder="Amount">
            
            <div class="button-group">
                <button id="cash-in" onclick="addTransaction('in')">+ Cash In</button>
                <button id="cash-out" onclick="addTransaction('out')">- Cash Out</button>
            </div>
        </div>

        <h3>Transaction History</h3>
        <ul id="history-list" class="history-list">
            </ul>
        
        <button class="clear-btn" onclick="clearHistory()">Clear All History</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
