<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Param Shriram Trading - Pro Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1a73e8; margin-top: 0; }
        
        /* Dashboard Stats */
        .stats { display: flex; gap: 10px; margin-bottom: 20px; text-align: center; }
        .stat-box { flex: 1; padding: 15px; border-radius: 10px; color: white; font-weight: bold; }
        .total-box { background: #1a73e8; }
        
        .form-section, .filter-section { background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        input, select, button { padding: 12px; margin: 5px 0; width: 100%; box-sizing: border-box; border-radius: 6px; border: 1px solid #ddd; font-size: 15px; }
        button { background: #1a73e8; color: white; border: none; cursor: pointer; transition: 0.2s; font-weight: 600; }
        button:hover { background: #1557b0; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f1f3f4; color: #555; }
        .in { color: #28a745; font-weight: bold; }
        .out { color: #dc3545; font-weight: bold; }
        
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Param Shriram Trading Co.</h2>

    <div class="stats">
        <div class="stat-box total-box">
            <small>Current Cash Balance</small>
            <div id="mainBalance" style="font-size: 24px;">₹0</div>
        </div>
    </div>

    <div class="form-section">
        <div class="grid">
            <input type="text" id="name" placeholder="Bande da Naam">
            <input type="number" id="amount" placeholder="Amount (₹)">
        </div>
        <div class="grid">
            <select id="type">
                <option value="Cash In">Cash In (Kamayi)</option>
                <option value="Cash Out">Cash Out (Kharcha)</option>
            </select>
            <input type="text" id="remark" placeholder="Remark">
        </div>
        <button id="saveBtn" onclick="sendData()">Save Transaction</button>
    </div>

    <div class="filter-section">
        <div class="grid">
            <input type="text" id="searchName" placeholder="Naam naal labho..." onkeyup="filterTable()">
            <button onclick="loadHistory()" style="background: #34a853;">Refresh Data</button>
        </div>
    </div>

    <div style="overflow-x:auto;">
        <table id="historyTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Remark</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // PASTE YOUR URL HERE
    const scriptURL = '<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Param Shriram Trading - Cash Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 0.9em; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <h2>Param Shriram Trading</h2>
    <p class="subtitle">Official Cash Tracker</p>
    
    <div class="form-group">
        <label>Amount (Paise)</label>
        <input type="number" id="amount" placeholder="₹ Enter Amount" required>
    </div>

    <div class="form-group">
        <label>Transaction Type</label>
        <select id="type">
            <option value="Cash In (Kamayi)">Cash In (Kamayi)</option>
            <option value="Cash Out (Kharcha)">Cash Out (Kharcha)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Remark (Viraam)</label>
        <input type="text" id="remark" placeholder="e.g. Diesel, Labour, Sale">
    </div>

    <button id="submitBtn" onclick="sendData()">Save to Google Sheet</button>
    <div id="status"></div>
</div>

<script>
    async function sendData() {
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;
        const remark = document.getElementById('remark').value;
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('submitBtn');

        // Tuhada Google Script URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwewUNZbkdq__fZucwoIHBKdszveToMIVVDoAB0bDRcPRnV3yNqa5ZRinhy5b6DovEo/exec';

        if (!amount || amount <= 0) {
            alert("Kripya sahi amount bharo!");
            return;
        }

        // Loading state
        btn.disabled = true;
        btn.innerText = "Saving Data...";
        statusDiv.innerHTML = "Processing...";
        statusDiv.className = "";

        const data = {
            amount: amount,
            type: type,
            remark: remark
        };

        try {
            // Google Sheets nu data bhej rahe han
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // Google Apps Script layi zaroori hai
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            // Success message
            statusDiv.innerHTML = "✅ Data successfully save ho gaya!";
            statusDiv.className = "success";
            
            // Form clear karo
            document.getElementById('amount').value = '';
            document.getElementById('remark').value = '';
        } catch (error) {
            console.error('Error:', error);
            statusDiv.innerHTML = "❌ Error: Data save nahi hoya!";
            statusDiv.className = "error";
        } finally {
            btn.disabled = false;
            btn.innerText = "Save to Google Sheet";
        }
    }
</script>

</body>
</html>
